<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alquileres</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E3A5F" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alquileres" />
    <link rel="apple-touch-icon" href="/icono-192.png" />
    <link rel="icon" type="image/png" href="/icono-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // ¿La pestaña ya estaba controlada por un SW al cargar? (visita previa)
        var yaControlada = !!navigator.serviceWorker.controller
        var recargando = false
        // Cuando un SW nuevo toma control (deploy nuevo) → recargar una vez
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (recargando || !yaControlada) return
          recargando = true
          window.location.reload()
        })
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            // Buscar actualizaciones cada vez que la pestaña vuelve a foco
            reg.update()
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update()
            })
          })
        })
      }
    </script>
  </body>
</html>
